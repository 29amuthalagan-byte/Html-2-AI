<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DIGITAL MEDIA | Design</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=Inter:wght@200&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <style>
        :root { --accent: #8c7e6d; }
        body { margin: 0; background: #000; color: white; overflow-x: hidden; font-family: 'Inter', sans-serif; }
        
        /* Parallax Background */
        .bg-container { position: fixed; top: 0; left: 0; width: 115%; height: 115%; z-index: -1; }
        .bg-container img { width: 100%; height: 100%; object-fit: cover; opacity: 0.15; filter: grayscale(1) brightness(0.5); }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at center, transparent, #000); z-index: -1; }

        /* Navigation */
        .navbar { position: fixed; top: 0; width: 100%; padding: 40px; display: flex; justify-content: space-between; z-index: 1000; box-sizing: border-box; }
        .logo { font-family: 'Cormorant Garamond', serif; font-size: 20px; letter-spacing: 5px; text-transform: uppercase; }
        .nav-links { display: flex; gap: 30px; list-style: none; margin: 0; padding: 0; }
        .nav-links a { color: white; text-decoration: none; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; opacity: 0.6; transition: 0.4s; }
        .nav-links a:hover { opacity: 1; color: var(--accent); }

        /* Header */
        .page-header { padding: 150px 0 50px; text-align: center; }
        h1.big-title { font-family: 'Cormorant Garamond', serif; font-size: 8.5vw; font-weight: 300; text-transform: uppercase; letter-spacing: 20px; margin: 0; }
        .char { display: inline-block; opacity: 0; transform: translateY(40px); }

        /* Gallery Container */
        .gallery-container { padding: 0 5%; width: 100%; box-sizing: border-box; padding-bottom: 100px; }
        
        .row-top { display: flex; justify-content: space-between; gap: 20px; margin-bottom: 80px; }
        .row-bottom { display: flex; justify-content: space-between; gap: 30px; }
        
        .gallery-item { opacity: 0; transform: translateY(60px); overflow: hidden; position: relative; }
        
        /* Sizing */
        .row-top .gallery-item { flex: 1; height: 65vh; border: 0.5px solid rgba(255,255,255,0.1); }
        .row-bottom .gallery-item.wide { width: 48%; height: 50vh; }

        /* ALL images now Full Color by default */
        .gallery-item img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            display: block; 
            filter: none; /* No grey animation */
            transition: 1.2s cubic-bezier(0.2, 1, 0.3, 1); 
        }

        /* Subtle Zoom Hover for Top Row */
        .row-top .gallery-item:hover img { 
            transform: scale(1.03); 
        }

        .item-caption { margin-top: 20px; color: var(--accent); font-family: 'Cormorant Garamond', serif; letter-spacing: 3px; font-size: 14px; text-transform: uppercase; }
    </style>
</head>
<body>
    <div class="bg-container">
        <img id="parallax-bg" src="https://images.unsplash.com/photo-1486406146926-c627a92ad1ab?q=80&w=1920">
        <div class="overlay"></div>
    </div>

    <nav class="navbar">
        <div class="logo">DESIGN<span>.</span></div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="photography.html">Photography</a></li>
            <li><a href="design.html">Design</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </nav>

    <div class="page-header"><h1 class="big-title" id="anim-title">Design</h1></div>

    <div class="gallery-container">
        <div class="row-top">
            <div class="gallery-item"><img src="p3.png"></div>
            <div class="gallery-item"><img src="p1.png"></div>
            <div class="gallery-item"><img src="p5.png"></div>
        </div>
        
        <div class="row-bottom">
            <div class="gallery-item wide">
                <img src="P10.png">
                <div class="item-caption">Project 01 // ATOMIC HABITAT</div>
            </div>
            <div class="gallery-item wide">
                <img src="P15.png">
                <div class="item-caption">Project 02 // TYPOGRAPHY</div>
            </div>
        </div>
    </div>

    <script>
        gsap.registerPlugin(ScrollTrigger);

        // Mouse Parallax
        window.addEventListener('mousemove', (e) => {
            const x = (e.clientX/window.innerWidth-0.5)*30;
            const y = (e.clientY/window.innerHeight-0.5)*30;
            gsap.to("#parallax-bg", { x: x, y: y, duration: 2, ease: "power2.out" });
        });

        // Title Reveal
        const text = document.getElementById('anim-title');
        text.innerHTML = text.textContent.replace(/\S/g, "<span class='char'>$&</span>");
        gsap.to(".char", { opacity: 1, y: 0, stagger: 0.08, duration: 1.5, ease: "expo.out" });

        // Gallery Reveal
        gsap.utils.toArray(".gallery-item").forEach((item) => {
            gsap.to(item, { 
                scrollTrigger: { trigger: item, start: "top 95%" }, 
                opacity: 1, 
                y: 0, 
                duration: 1.5, 
                ease: "power2.out" 
            });
        });
    </script>
</body>
</html>
